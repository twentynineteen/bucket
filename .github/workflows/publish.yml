name: 'publish'

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      notarize:
        description: 'Run notarization (uses expensive macOS minutes)'
        required: false
        default: false
        type: boolean

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.
# NOTE: Notarization is disabled by default to save GitHub Actions minutes.
# Use local notarization with: ./scripts/notarize-local.sh
# Or trigger manually with notarize=true for full GitHub-based notarization.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      app-version: ${{ steps.get_version.outputs.version }}
      release-notes: ${{ steps.release_notes.outputs.body }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get app version
        id: get_version
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Generate changelog
          if [ -z "$LATEST_TAG" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Create release body
          RELEASE_BODY="## What's Changed

          ${CHANGELOG}

          ## Installation

          Download the appropriate installer for your platform from the assets below.

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...app-v${{ steps.get_version.outputs.version }}"

          # Save to output (handle multiline)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-tauri:
    name: Build Tauri App
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14' # Apple Silicon runner for native arm64 builds
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-14' # Intel builds on Apple Silicon runner with cross-compilation
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up cargo cache
        uses: actions/cache@v5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: install dependencies (macOS only)
        if: contains(matrix.platform, 'macos')
        run: |
          brew install pkg-config

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: bun install

      - name: Import Apple Code Signing Certificate (macOS only)
        if: contains(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$APPLE_CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Clean up certificate file
          rm -f $CERTIFICATE_PATH

      - name: Build Tauri App (Signed, No Notarization)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # NOTE: Notarization env vars intentionally omitted - handled in separate job
        with:
          args: ${{ matrix.args }}
          tauriScript: 'bun run tauri'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: dmg-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 1

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v5
        with:
          name: updater-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 1

      - name: Clean up keychain (macOS only)
        if: always() && contains(matrix.platform, 'macos')
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain $KEYCHAIN_PATH || true

  # Fast release job (no notarization) - runs by default
  release:
    name: Create Release (No Notarization)
    if: ${{ github.event.inputs.notarize != 'true' }}
    needs: [prepare, build-tauri]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts

      - name: Display artifact structure
        run: ls -R ./artifacts

      - name: Rename updater artifacts to include architecture
        run: |
          # Rename updater files to include architecture to avoid conflicts
          for dir in ./artifacts/updater-*; do
            arch=$(basename "$dir" | sed 's/updater-//')
            for file in "$dir"/*.app.tar.gz; do
              if [ -f "$file" ]; then
                newname="${file%.app.tar.gz}_${arch}.app.tar.gz"
                mv "$file" "$newname"
              fi
            done
            for file in "$dir"/*.app.tar.gz.sig; do
              if [ -f "$file" ]; then
                newname="${file%.app.tar.gz.sig}_${arch}.app.tar.gz.sig"
                mv "$file" "$newname"
              fi
            done
          done
          echo "Renamed updater artifacts:"
          ls -la ./artifacts/updater-*

      - name: Generate latest.json for Tauri updater
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app-version }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.release-notes }}
          REPO: ${{ github.repository }}
        run: |
          # Read signature file contents (files already renamed with architecture suffix)
          AARCH64_SIG=$(cat ./artifacts/updater-aarch64-apple-darwin/*.app.tar.gz.sig)
          X86_64_SIG=$(cat ./artifacts/updater-x86_64-apple-darwin/*.app.tar.gz.sig)

          # Get updater artifact filenames
          AARCH64_FILE=$(basename ./artifacts/updater-aarch64-apple-darwin/*.app.tar.gz)
          X86_64_FILE=$(basename ./artifacts/updater-x86_64-apple-darwin/*.app.tar.gz)

          # Generate latest.json using jq for safe JSON encoding
          jq -n \
            --arg version "$APP_VERSION" \
            --arg notes "$RELEASE_NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64_url "https://github.com/${REPO}/releases/download/app-v${APP_VERSION}/${AARCH64_FILE}" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg x86_64_url "https://github.com/${REPO}/releases/download/app-v${APP_VERSION}/${X86_64_FILE}" \
            --arg x86_64_sig "$X86_64_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $aarch64_url, signature: $aarch64_sig },
                "darwin-x86_64": { url: $x86_64_url, signature: $x86_64_sig }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release (Draft - Needs Local Notarization)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ needs.prepare.outputs.app-version }}
          name: v${{ needs.prepare.outputs.app-version }} (Unsigned - Notarize Locally)
          body: |
            ${{ needs.prepare.outputs.release-notes }}

            ---
            **Note:** These DMGs are signed but NOT notarized.
            Run `./scripts/notarize-local.sh` to notarize before distributing.
          draft: true
          prerelease: false
          files: |
            ./artifacts/dmg-*/*.dmg
            ./artifacts/updater-*/*.app.tar.gz
            ./artifacts/updater-*/*.app.tar.gz.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare gh-pages directory
        run: |
          mkdir -p gh-pages
          cp latest.json gh-pages/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true

  # Full notarization job - only runs when explicitly requested
  notarize-and-release:
    name: Notarize and Release
    if: ${{ github.event.inputs.notarize == 'true' }}
    needs: [prepare, build-tauri]
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts

      - name: Display artifact structure
        run: ls -R ./artifacts

      - name: Notarize DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Starting notarization process..."

          for dmg in ./artifacts/dmg-*/*.dmg; do
            echo "Notarizing: $dmg"

            # Retry loop for notarization (Apple's service can be flaky)
            MAX_ATTEMPTS=3
            ATTEMPT=1
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              echo "Notarization attempt $ATTEMPT of $MAX_ATTEMPTS..."
              if xcrun notarytool submit "$dmg" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait; then
                echo "Notarization succeeded on attempt $ATTEMPT"
                break
              fi

              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "Notarization failed after $MAX_ATTEMPTS attempts"
                exit 1
              fi

              echo "Notarization failed, retrying in 30 seconds..."
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
            done

            # Staple the notarization ticket
            echo "Stapling: $dmg"
            xcrun stapler staple "$dmg"

            echo "Notarization complete for: $dmg"
          done

      - name: Rename updater artifacts to include architecture
        run: |
          # Rename updater files to include architecture to avoid conflicts
          for dir in ./artifacts/updater-*; do
            arch=$(basename "$dir" | sed 's/updater-//')
            for file in "$dir"/*.app.tar.gz; do
              if [ -f "$file" ]; then
                newname="${file%.app.tar.gz}_${arch}.app.tar.gz"
                mv "$file" "$newname"
              fi
            done
            for file in "$dir"/*.app.tar.gz.sig; do
              if [ -f "$file" ]; then
                newname="${file%.app.tar.gz.sig}_${arch}.app.tar.gz.sig"
                mv "$file" "$newname"
              fi
            done
          done
          echo "Renamed updater artifacts:"
          ls -la ./artifacts/updater-*

      - name: Generate latest.json for Tauri updater
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app-version }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.release-notes }}
          REPO: ${{ github.repository }}
        run: |
          # Read signature file contents (files already renamed with architecture suffix)
          AARCH64_SIG=$(cat ./artifacts/updater-aarch64-apple-darwin/*.app.tar.gz.sig)
          X86_64_SIG=$(cat ./artifacts/updater-x86_64-apple-darwin/*.app.tar.gz.sig)

          # Get updater artifact filenames
          AARCH64_FILE=$(basename ./artifacts/updater-aarch64-apple-darwin/*.app.tar.gz)
          X86_64_FILE=$(basename ./artifacts/updater-x86_64-apple-darwin/*.app.tar.gz)

          # Generate latest.json using jq for safe JSON encoding
          jq -n \
            --arg version "$APP_VERSION" \
            --arg notes "$RELEASE_NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64_url "https://github.com/${REPO}/releases/download/app-v${APP_VERSION}/${AARCH64_FILE}" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg x86_64_url "https://github.com/${REPO}/releases/download/app-v${APP_VERSION}/${X86_64_FILE}" \
            --arg x86_64_sig "$X86_64_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $aarch64_url, signature: $aarch64_sig },
                "darwin-x86_64": { url: $x86_64_url, signature: $x86_64_sig }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ needs.prepare.outputs.app-version }}
          name: v${{ needs.prepare.outputs.app-version }}
          body: ${{ needs.prepare.outputs.release-notes }}
          draft: true
          prerelease: false
          files: |
            ./artifacts/dmg-*/*.dmg
            ./artifacts/updater-*/*.app.tar.gz
            ./artifacts/updater-*/*.app.tar.gz.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare gh-pages directory
        run: |
          mkdir -p gh-pages
          cp latest.json gh-pages/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
